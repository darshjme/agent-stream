<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g>
    <line x1="555" y1="140" x2="785" y2="140" stroke="#1f6feb" stroke-width="2" stroke-opacity="0.3"/>
    <circle r="7" fill="#1f6feb" opacity="0.9">
      <animateMotion dur="2s" repeatCount="indefinite" path="M555,140 L785,140"/>
    </circle>
    <circle r="5" fill="#1f6feb" opacity="0.6">
      <animateMotion dur="2s" begin="0.6s" repeatCount="indefinite" path="M555,140 L785,140"/>
    </circle>
    <circle r="4" fill="#1f6feb" opacity="0.4">
      <animateMotion dur="2s" begin="1.2s" repeatCount="indefinite" path="M555,140 L785,140"/>
    </circle>
    <text x="670" y="125" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">streaming →</text>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-stream</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Streaming response handling for LLM agents — chunk accumulation, SSE par...</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="138" y="220" width="136" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="206" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Streaming Data</text>
    <rect x="286" y="220" width="120" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="346" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Backpressure</text>
    <rect x="418" y="220" width="136" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="486" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Async Iterator</text>
    <rect x="566" y="220" width="96" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="614" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Windowing</text>
</svg>